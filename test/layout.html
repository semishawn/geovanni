<!DOCTYPE html>
<html>

<head>
	{% include head.html %}
</head>

<body>
	<div class="window varcalc flex-show">

		<div class="window-head">
			<div class="window-title-bar">
				<div class="close-btn">
					<div class="close-peg"></div>
					<div class="close-peg"></div>
				</div>
				<span class="window-title">Bing ~ Bong</span>
			</div>
		</div>

		<div class="window-body calc-body">
			<div class="given">
				<span class="given-label">Given:</span>
				<div class="btn given-select">
					<i class="fas fa-sort-down"></i>
					<span class="given-current">heehoo</span>
				</div>
			</div>

			<div class="calc-content" style="display: block;">
				<div class="formula-container">
					<div class="formula">$$A=\frac{Pa}{2}$$</div>
				</div>

				<div class="shape-data">
					<div class="variable-container">
						{%- for i in (1..3) %}
						<div class="variable-row">
							<div class="char">$$w=$$</div>
							<input class="field" type="text" placeholder="Snawee" autocomplete="off">
						</div>
						{%- endfor %}

						<input type="radio" name="precision" id="dec-precision" autocomplete="off" checked>
						<label class="precision-row decimal-row" for="dec-precision">
							Decimal Places
							<div class="setter-container">
								<button class="setter dec"><i class="fas fa-minus"></i></button>
								<span class="current-places">2</span>
								<button class="setter inc"><i class="fas fa-plus"></i></button>
							</div>
						</label>

						<input type="radio" name="precision" id="sig-fig-precision" autocomplete="off">
						<label class="precision-row sig-fig-row" for="sig-fig-precision">Significant Figures</label>

						<div class="variable-row">
							<div class="char">$$A=$$</div>
							<div class="result-wrap">
								<input class="field result" type="text" placeholder="Weesnaw" autocomplete="off">
								<button class="copy"><i class="far fa-copy"></i></button>
							</div>
						</div>
					</div>
					<div class="shape-diagram"></div>
				</div>

				<div class="btn-container">
					<button class="btn calculate"><i class="fas fa-calculator"></i>Calculate</button>
					<button class="btn clear"><i class="fas fa-trash"></i>Clear values</button>
				</div>
			</div>
		</div>
	</div>
</body>

</html>
