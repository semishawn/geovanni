<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.5.1.min.js"></script>
	<link rel="stylesheet" href="../css/variables.css">
	<style>
		.circle {width: 150px;}

		.selected text {fill: var(--accent) !important;}
		.selected *:not(text) {
			stroke: var(--accent) !important;
			stroke-width: 1 !important;
		}
	</style>
</head>

<body>
	<input class="field" type="text" placeholder="r"><br>
	<input class="field" type="text" placeholder="d"><br>
	<input class="field" type="text" placeholder="C">
	<div class="circle"></div>

	<script>
		$.get('../img/circle/circle.svg', function(data) {
			$('.circle').html(data);
		}, 'html');

		$('.field').focus(function() {
			var char = $(this).attr('placeholder');
			$('g:contains(' + char + ')').addClass('selected');
		});

		$('.field').focusout(function() {
			$('g').removeClass('selected');
		});
	</script>
</body>

</html>
